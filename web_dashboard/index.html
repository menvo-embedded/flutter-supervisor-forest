    window.downloadPdfReport = function (id) {
      const element = document.getElementById('pdfReportTemplate');
      if (!element) return alert('Lỗi: Không tìm thấy mẫu báo cáo để tải!');
      
      const opt = {
        margin:       [10, 10, 10, 10],
        filename:     `Bao_cao_${id}_${new Date().toISOString().slice(0, 10)}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      
      toast('Đang tải tệp PDF về máy...');
      html2pdf().set(opt).from(element).save();
    };

    /* ====================== MODULE 11: FILES ====================== */
    function renderFiles() {
      const codes = ownedProjectCodes();
      const projs = codes ? DB.projects.filter(p => codes.includes(p.code)) : DB.projects;
      document.getElementById('pageContent').innerHTML = `
    <div class="page-head">
      <div><h1>Hồ sơ/Tài liệu</h1><p>Quản lý hồ sơ, tài liệu và ảnh hiện trường</p></div>
      <div class="toolbar">
        <div class="search-box">🔍 <input placeholder="Tìm tên tệp..." oninput="filterFiles(this.value)"></div>
        <select class="select-sm" onchange="filterFilesByCategory(this.value)">
          <option value="all">Tất cả danh mục</option>
          ${['Hồ sơ pháp lý', 'Hồ sơ dự án', 'Hình ảnh hiện trường', 'Báo cáo khảo sát'].map(c => `<option>${c}</option>`).join('')}
        </select>
        <button class="btn btn-primary" onclick="openUploadModal()">+ Tải tệp lên</button>
      </div>
    </div>
    <div class="card"><div id="filesTableWrap">${filesTableHtml(DB.files)}</div></div>`;
    }
    function filesTableHtml(rows) {
      return renderTable([
        { label: 'Tên tệp', render: f => `<div class="cell-strong">📎 ${f.name}</div>` },
        { label: 'Danh mục', render: f => `<span class="badge badge-info">${f.category}</span>` },
        { label: 'Dự án', key: 'project' },
        { label: 'Người tải lên', key: 'uploader' },
        { label: 'Ngày', key: 'date' },
        { label: 'Kích thước', key: 'size' },
        {
          label: '', render: f => `<div style="display:flex;gap:6px;">
      <button class="btn btn-outline btn-sm" onclick="toast('Đang tải: ${f.name}')">Tải về</button>
      <button class="btn btn-danger-outline btn-sm" onclick="deleteFile('${f.name}')">🗑️</button>
    </div>`},
      ], rows, { emptyText: 'Chưa có tệp nào' });
    }
    function filterFiles(q) { q = q.toLowerCase(); document.getElementById('filesTableWrap').innerHTML = filesTableHtml(DB.files.filter(f => f.name.toLowerCase().includes(q))); }
    function filterFilesByCategory(cat) { document.getElementById('filesTableWrap').innerHTML = filesTableHtml(cat === 'all' ? DB.files : DB.files.filter(f => f.category === cat)); }
    function deleteFile(name) {
      if (!confirm('Xóa tệp ' + name + '?')) return;
      DB.files = DB.files.filter(f => f.name !== name);
      toast('Đã xóa tệp'); renderFiles();
    }
    function openUploadModal() {
      const codes = ownedProjectCodes();
      const projs = codes ? DB.projects.filter(p => codes.includes(p.code)) : DB.projects;
      openModal('Tải tệp mới', `
    <div class="field"><label>Chọn tệp (PDF, JPG, PNG, DOCX, KML)</label>
      <input type="file" id="uf_file" accept=".pdf,.jpg,.png,.docx,.kml,.zip"></div>
    <div class="field"><label>Danh mục</label>
      <select id="uf_cat">${['Hồ sơ pháp lý', 'Hồ sơ dự án', 'Hình ảnh hiện trường', 'Báo cáo khảo sát'].map(c => `<option>${c}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Dự án liên quan</label>
      <select id="uf_proj">${projs.map(p => `<option>${p.name}</option>`).join('')}</select>
    </div>`,
        `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="uploadFile()">Tải lên</button>`);
    }
    function uploadFile() {
      const fileInput = document.getElementById('uf_file');
      const name = fileInput.files[0]?.name || 'Tep_mau.pdf';
      DB.files.unshift({
        name, category: document.getElementById('uf_cat').value,
        project: document.getElementById('uf_proj').value, uploader: currentUser.fullName,
        date: new Date().toISOString().slice(0, 10), size: '—'
      });
      toast('Tải lên thành công: ' + name); closeModal(); renderFiles();
    }

    /* ====================== MODULE 3: USERS & PHÂN QUYỀN ====================== */
    function renderUsers() {
      if (currentUser.role !== 'platform_admin') {
        document.getElementById('pageContent').innerHTML = `<div class="empty-state"><div class="ic">🔒</div><div>Chỉ quản trị viên mới có quyền quản lý tài khoản.</div></div>`;
        return;
      }
      document.getElementById('pageContent').innerHTML = `
    <div class="page-head">
      <div><h1>Người dùng & Phân quyền</h1><p>Quản lý tài khoản và vai trò hệ thống</p></div>
      <div class="toolbar">
        <div class="search-box">🔍 <input placeholder="Tìm tên, email..." oninput="filterUsers(this.value)"></div>
        <select class="select-sm" onchange="filterUsersByRole(this.value)">
          <option value="all">Tất cả vai trò</option>
          <option value="platform_admin">Quản trị viên</option>
          <option value="forest_owner">Chủ rừng</option>
          <option value="forest_worker">Nhân viên hiện trường</option>
        </select>
        <button class="btn btn-primary" onclick="openCreateProfileModal()">+ Thêm tài khoản</button>
      </div>
    </div>
    <div class="card"><div id="usersTableWrap">${usersTableHtml(DB.users)}</div></div>`;
    }
    function usersTableHtml(rows) {
      return renderTable([
        { label: 'Mã NV', render: u => `<span class="mono cell-strong">${u.id}</span>` },
        { label: 'Họ và tên', key: 'fullName' },
        { label: 'Email', key: 'email' },
        { label: 'Điện thoại', key: 'phone' },
        { label: 'Vai trò', render: u => `<span class="badge badge-info">${roleLabel(u.role)}</span>` },
        { label: 'Trạng thái', render: u => statusBadge(u.status) },
        {
          label: '', render: u => `<div style="display:flex;gap:6px;">
      <button class="btn btn-outline btn-sm" onclick="openUserModal('${u.id}')">✏️</button>
      ${u.id !== currentUser.id ? `<button class="btn btn-danger-outline btn-sm" onclick="toggleUserStatus('${u.id}')">🔒</button>` : ''}
    </div>`},
      ], rows, { emptyText: 'Chưa có người dùng' });
    }
    function filterUsers(q) { q = q.toLowerCase(); document.getElementById('usersTableWrap').innerHTML = usersTableHtml(DB.users.filter(u => u.fullName.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))); }
    function filterUsersByRole(role) { document.getElementById('usersTableWrap').innerHTML = usersTableHtml(role === 'all' ? DB.users : DB.users.filter(u => u.role === role)); }
    function profileStatusLabel(status) {
      return { active: 'Hoạt động', inactive: 'Không hoạt động', locked: 'Đã khóa' }[status] || status;
    }
    function showProfileFormError(message) {
      const box = document.getElementById('profileFormError');
      if (box) { box.textContent = message; box.style.display = 'block'; }
      toast(message, 'error');
    }
    function isDuplicateProfileError(error) {
      const msg = (error?.message || error?.details || '').toLowerCase();
      return error?.code === '23505' || msg.includes('duplicate') || msg.includes('already exists') || msg.includes('unique');
    }
    async function edgeFunctionErrorMessage(error) {
      if (error?.context) {
        try {
          const body = await error.context.json();
          if (body?.message) return body.message;
        } catch (_) { }
      }
      return error?.message || 'Không thể gửi email kích hoạt tài khoản.';
    }
    function openCreateProfileModal() {
      openModal('Thêm tài khoản người dùng', `
    <div class="banner"><span class="ic">✉️</span> Hệ thống sẽ gửi email kích hoạt tài khoản qua Supabase Authentication. Người dùng bấm link trong email để thiết lập mật khẩu.</div>
    <div class="detail-panel" style="margin-bottom:14px;">
      <div class="detail-row"><span class="k">Bước 1</span><span class="v">Nhập email và thông tin hồ sơ.</span></div>
      <div class="detail-row"><span class="k">Bước 2</span><span class="v">Chọn vai trò và trạng thái để hệ thống phân quyền.</span></div>
      <div class="detail-row"><span class="k">Bước 3</span><span class="v">Người dùng mở email kích hoạt để đặt mật khẩu.</span></div>
    </div>
    <div class="login-error" id="profileFormError" style="display:none; margin-bottom:12px;"></div>
    <div class="field"><label>Email *</label><input id="np_email" type="email" placeholder="user@gmail.com"></div>
    <div class="field-row">
      <div class="field"><label>Họ và tên *</label><input id="np_name" placeholder="Nguyễn Văn A"></div>
      <div class="field"><label>Số điện thoại</label><input id="np_phone" placeholder="090..."></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Vai trò *</label>
        <select id="np_role">
          ${['admin', 'owner', 'worker'].map(r => `<option value="${r}">${roleLabel(r)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Trạng thái *</label>
        <select id="np_status">
          ${['active', 'inactive', 'locked'].map(s => `<option value="${s}">${profileStatusLabel(s)}</option>`).join('')}
        </select>
      </div>
    </div>`,
        `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" id="inviteUserBtn" onclick="saveProfileAccount()">✉️ Gửi email kích hoạt</button>`);
    }
    async function saveProfileAccount() {
      const email = document.getElementById('np_email').value.trim();
      const fullName = document.getElementById('np_name').value.trim();
      const phone = document.getElementById('np_phone').value.trim();
      const role = document.getElementById('np_role').value;
      const status = document.getElementById('np_status').value;
      const validRoles = ['admin', 'owner', 'worker'];
      const validStatuses = ['active', 'inactive', 'locked'];
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      if (!email || !emailOk) return showProfileFormError('Vui lòng nhập email hợp lệ.');
      if (!fullName) return showProfileFormError('Vui lòng nhập họ và tên.');
      if (!validRoles.includes(role)) return showProfileFormError('Vai trò không hợp lệ.');
      if (!validStatuses.includes(status)) return showProfileFormError('Trạng thái không hợp lệ.');
      if (DB.users.some(u => String(u.email || '').toLowerCase() === email.toLowerCase())) {
        return showProfileFormError('Tài khoản này đã có hồ sơ trong hệ thống');
      }

      const btn = document.getElementById('inviteUserBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Đang gửi email...'; }
      const redirectTo = window.location.origin;
      const payload = { email, full_name: fullName, phone, role, status, redirect_to: redirectTo };
      try {
        const { data, error } = await supabaseClient.functions.invoke('create-invite-user', { body: payload });
        if (error) throw error;
        if (data && data.success === false) throw new Error(data.message || 'Không thể gửi email kích hoạt tài khoản.');
        toast(data?.message || 'Đã gửi email kích hoạt tài khoản');
        closeModal();
        await loadDataFromSupabase();
        renderUsers();
      } catch (error) {
        console.error(error);
        if (isDuplicateProfileError(error)) {
          showProfileFormError('Tài khoản này đã có hồ sơ trong hệ thống');
        } else {
          showProfileFormError(await edgeFunctionErrorMessage(error));
        }
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '✉️ Gửi email kích hoạt'; }
      }
    }
    function openUserModal(id) {
      if (!id) { openCreateProfileModal(); return; }
      const u = id ? DB.users.find(x => x.id === id) : null;
      openModal('Sửa hồ sơ tài khoản', `
    <div class="field-row">
      <div class="field"><label>Họ và tên *</label><input id="u_name" value="${u?.fullName || ''}"></div>
      <div class="field"><label>Điện thoại</label><input id="u_phone" value="${u?.phone || ''}"></div>
    </div>
    <div class="field"><label>Email *</label><input id="u_email" type="email" value="${u?.email || ''}"></div>
    <div class="field-row">
      <div class="field"><label>Vai trò</label>
        <select id="u_role">
          ${['platform_admin', 'forest_owner', 'forest_worker'].map(r => `<option value="${r}" ${u?.role === r ? 'selected' : ''}>${roleLabel(r)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Trạng thái</label>
        <select id="u_status">
          ${['active', 'inactive', 'locked'].map(s => `<option value="${s}" ${u?.status === s ? 'selected' : ''}>${{ active: 'Hoạt động', inactive: 'Không hoạt động', locked: 'Đã khóa' }[s]}</option>`).join('')}
        </select>
      </div>
    </div>
    `,
        `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveUser('${id || ''}')">💾 Lưu</button>`);
    }
    async function saveUser(id) {
      const data = {
        fullName: document.getElementById('u_name').value.trim(),
        phone: document.getElementById('u_phone').value.trim(),
        email: document.getElementById('u_email').value.trim(),
        role: document.getElementById('u_role').value,
        status: document.getElementById('u_status').value
      };
      if (!data.fullName || !data.email) { toast('Vui lòng nhập đủ Tên và Email', 'error'); return; }
      if (id) {
        const payload = {
          full_name: data.fullName,
          phone: data.phone,
          email: data.email,
          role: roleToSupabase(data.role),
          status: data.status
        };
        const { error } = await supabaseClient.from('profiles').update(payload).eq('id', id);
        if (error) { toast(error.message || 'Không thể cập nhật hồ sơ tài khoản', 'error'); return; }
        toast('Đã cập nhật hồ sơ tài khoản');
        closeModal();
        await loadDataFromSupabase();
        renderUsers();
      } else {
        openCreateProfileModal();
      }
    }
    async function toggleUserStatus(id) {
      const u = DB.users.find(x => x.id === id);
      const nextStatus = u.status === 'active' ? 'locked' : (u.status === 'locked' ? 'active' : u.status);
      const { error } = await supabaseClient.from('profiles').update({ status: nextStatus }).eq('id', id);
      if (error) { toast(error.message || 'Không thể cập nhật trạng thái tài khoản', 'error'); return; }
      toast(nextStatus === 'active' ? 'Đã mở khóa tài khoản' : 'Đã khóa tài khoản');
      await loadDataFromSupabase();
      renderUsers();
    }

    /* ====================== MODULE 13: NOTIFICATIONS ====================== */
    function renderNotifications() {
      const icons = { logbook: '📒', project: '🌳', profile: '👤', request: '📌', file: '📎' };
      document.getElementById('pageContent').innerHTML = `
    <div class="page-head">
      <div><h1>Thông báo</h1><p>${DB.notifications.filter(n => !n.read).length} thông báo chưa đọc</p></div>
      <button class="btn btn-outline btn-sm" onclick="markAllRead()">✓ Đánh dấu tất cả đã đọc</button>
    </div>
    <div class="card">
      ${DB.notifications.map((n, i) => `
        <div style="display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer; background:${!n.read ? 'rgba(16,124,65,.03)' : 'transparent'};" onclick="markRead(${i})">
          <div style="width:40px; height:40px; border-radius:12px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;">${icons[n.type] || '🔔'}</div>
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:8px;">
              <div style="font-weight:${n.read ? '500' : '700'}; font-size:13.5px;">${n.title}</div>
              ${!n.read ? '<span class="badge badge-active" style="font-size:10px;">Mới</span>' : ''}
            </div>
            <div style="font-size:12.5px; color:var(--text-2); margin-top:2px;">${n.desc}</div>
            <div style="font-size:11.5px; color:var(--text-hint); margin-top:4px;">🕐 ${n.time}</div>
          </div>
        </div>`).join('')}
    </div>`;
    }
    function markRead(i) { DB.notifications[i].read = true; renderNotifications(); renderSidebar(); }
    function markAllRead() { DB.notifications.forEach(n => n.read = true); renderNotifications(); renderSidebar(); toast('Đã đánh dấu tất cả đã đọc'); }

    /* ====================== SETTINGS ====================== */
    function renderSettings() {
      if (currentUser.role !== 'platform_admin') {
        document.getElementById('pageContent').innerHTML = `<div class="empty-state"><div class="ic">🔒</div><div>Chỉ quản trị viên mới có quyền truy cập Cài đặt.</div></div>`;
        return;
      }
      document.getElementById('pageContent').innerHTML = `
    <div class="page-head"><div><h1>Cài đặt</h1><p>Cấu hình hệ số carbon và hệ thống</p></div></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="card">
        <div class="card-head"><h3>Cấu hình hệ số loài cây</h3><button class="btn btn-primary btn-sm" onclick="openAddFactorModal()">+ Thêm loài</button></div>
        ${renderTable([
        { label: 'Loài cây', key: 'species' },
        { label: 'Hệ số gỗ', key: 'factor' },
        { label: 'Tiêu chuẩn', render: () => 'IPCC mặc định' },
        { label: '', render: f => `<button class="btn btn-outline btn-sm" onclick="editFactor('${f.species}')">Sửa</button>` },
      ], DB.speciesFactors)}
        <div style="margin-top:14px; padding:12px; background:var(--surface-2); border-radius:10px; font-size:12px; color:var(--text-2);">
          <b>Công thức tính Carbon:</b><br>
          <span class="mono">AGB = V × WD × BEF × (1+R)</span><br>
          <span class="mono">Carbon = AGB × CF (0.5)</span><br>
          <span class="mono">CO₂e = Carbon × 3.67</span>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Cài đặt hệ thống</h3></div>
        <div class="field"><label>Tên hệ thống</label><input value="Nền tảng quản lý rừng carbon QLR"></div>
        <div class="field" style="margin-top:12px;"><label>API ứng dụng di động</label><input class="mono" value="https://api.qlr-forest.vn/v1" style="font-size:12px;"></div>
        <div class="field" style="margin-top:12px;"><label>Khóa JWT</label><input type="password" value="qlr_secret_key_2024"></div>
        <div class="field" style="margin-top:12px;"><label>Múi giờ</label><select><option>Asia/Ho_Chi_Minh (UTC+7)</option></select></div>
        <div class="field" style="margin-top:12px;"><label>Ngôn ngữ mặc định</label><select><option>Tiếng Việt</option><option>English</option></select></div>
        <button class="btn btn-primary" style="width:100%; margin-top:18px;" onclick="toast('Đã lưu cài đặt!')">💾 Lưu cài đặt</button>
      </div>
    </div>`;
    }
    function openAddFactorModal() {
      openModal('Thêm hệ số loài cây', `
    <div class="field"><label>Tên loài cây *</label><input id="sf_sp" placeholder="VD: Lim xanh"></div>
    <div class="field"><label>Hệ số gỗ *</label><input id="sf_f" type="number" step="0.01" placeholder="VD: 0.65"></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="addFactor()">💾 Lưu</button>`);
    }
    function addFactor() {
      const sp = document.getElementById('sf_sp').value.trim();
      const f = Number(document.getElementById('sf_f').value);
      if (!sp || !f) { toast('Vui lòng nhập đủ thông tin', 'error'); return; }
      DB.speciesFactors.push({ species: sp, factor: f });
      toast('Đã thêm loài ' + sp); closeModal(); renderSettings();
    }
    function editFactor(species) {
      const sf = DB.speciesFactors.find(f => f.species === species);
      openModal('Sửa hệ số loài cây: ' + species, `
    <div class="field"><label>Hệ số gỗ</label><input id="ef_val" type="number" step="0.01" value="${sf.factor}"></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveFactor('${species}')">💾 Lưu</button>`);
    }
    function saveFactor(species) {
      DB.speciesFactors.find(f => f.species === species).factor = Number(document.getElementById('ef_val').value);
      toast('Đã cập nhật hệ số'); closeModal(); renderSettings();
    }

    /* Enter key submits login */
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    bootstrapExistingSession();
  </script>
</body>

</html>
