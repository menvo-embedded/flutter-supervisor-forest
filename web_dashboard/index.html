<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QLR · Bảng điều khiển quản lý dữ liệu rừng &amp; carbon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Turf.js for GIS calculations -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <!-- Geoman Draw Tools -->
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
  <!-- html2pdf.js for exporting PDF reports -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Proj4js for projection conversion -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <!-- Shapefile JS for parsing shapefiles (SHP/ZIP) -->
  <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>
  <style>
    :root {
      --primary: #107C41;
      --primary-dark: #0A5C30;
      --primary-mid: #1A9E54;
      --primary-light: #E8F5EE;
      --accent: #34D399;
      --amber: #F59E0B;
      --red: #DC2626;
      --blue: #2563EB;
      --bg: #F4F7F5;
      --surface: #FFFFFF;
      --surface-2: #F1F5F2;
      --text: #0F2418;
      --text-2: #5B6B63;
      --text-hint: #9AA8A1;
      --border: #E4EAE6;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --shadow: 0 1px 2px rgba(16, 28, 20, .04), 0 8px 24px rgba(16, 28, 20, .06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    a {
      color: inherit;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #CBD5CE;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* ========== LOGIN VIEW ========== */
    .login-view {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, .06) 0, transparent 35%),
        radial-gradient(circle at 85% 80%, rgba(255, 255, 255, .05) 0, transparent 40%),
        linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .25);
    }

    .login-logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .login-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -.3px;
    }

    .login-sub {
      text-align: center;
      font-size: 12.5px;
      color: var(--text-2);
      margin-top: 4px;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .field-row {
      display: flex;
      gap: 10px;
    }

    .field-row .field {
      flex: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 18px;
      border-radius: var(--r-md);
      font-size: 13.5px;
      font-weight: 600;
      border: 1.5px solid transparent;
      transition: all .15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-outline {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-danger-outline {
      background: transparent;
      border-color: var(--red);
      color: var(--red);
    }

    .btn-danger-outline:hover {
      background: rgba(220, 38, 38, .06);
    }

    .btn-block {
      width: 100%;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-icon {
      padding: 8px;
      border-radius: var(--r-sm);
    }

    .demo-row {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demo-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border: 1px solid rgba(16, 124, 65, .18);
    }

    .demo-chip:hover {
      background: #d8efe2;
    }

    .login-error {
      background: #FEF2F2;
      color: var(--red);
      border: 1px solid #FCA5A5;
      border-radius: var(--r-md);
      padding: 10px 14px;
      font-size: 12.5px;
      margin-bottom: 14px;
      display: none;
    }

    /* ========== APP SHELL ========== */
    .app-view {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 248px;
      background: var(--primary-dark);
      color: #fff;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .sidebar-brand .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .sidebar-brand .name {
      font-weight: 800;
      font-size: 14.5px;
      line-height: 1.2;
    }

    .sidebar-brand .sub {
      font-size: 10.5px;
      color: rgba(255, 255, 255, .55);
      margin-top: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px;
    }

    .nav-section-label {
      font-size: 10.5px;
      font-weight: 800;
      color: rgba(255, 255, 255, .48);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 16px 12px 7px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border-radius: 10px;
      color: rgba(255, 255, 255, .72);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background .12s, color .12s, transform .12s;
      border: 1px solid transparent;
    }

    .nav-item .ic {
      font-size: 16px;
      width: 18px;
      text-align: center;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff;
      transform: translateX(1px);
    }

    .nav-item.active {
      background: rgba(255, 255, 255, .13);
      color: #fff;
      font-weight: 700;
      border-color: rgba(255, 255, 255, .14);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .nav-item .badge-count {
      margin-left: auto;
      background: var(--amber);
      color: #1a1a1a;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-foot {
      padding: 14px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      font-size: 11px;
      color: rgba(255, 255, 255, .4);
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .topbar-sub {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 1px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      position: relative;
    }

    .icon-btn .dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      border: 1.5px solid #fff;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px 6px 6px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .user-chip .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }

    .user-chip .meta {
      line-height: 1.25;
    }

    .user-chip .meta .name {
      font-size: 12.5px;
      font-weight: 700;
    }

    .user-chip .meta .role {
      font-size: 10.5px;
      color: var(--text-2);
    }

    .content {
      padding: 22px 28px;
      max-width: 1440px;
      width: 100%;
    }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .page-head h1 {
      font-size: 22px;
      font-weight: 800;
    }

    .page-head p {
      font-size: 12.5px;
      color: var(--text-2);
      margin-top: 3px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 9px 14px;
      min-width: 220px;
    }

    .search-box input {
      border: none;
      outline: none;
      font-size: 13px;
      width: 100%;
      font-family: inherit;
      background: transparent;
    }

    .select-sm {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
    }

    /* Grid helpers */
    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .grid-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid-5 {
      grid-template-columns: repeat(5, 1fr);
    }

    .col-span-2 {
      grid-column: span 2;
    }

    @media(max-width:1200px) {
      .grid-5 {
        grid-template-columns: repeat(3, 1fr);
      }

      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-head h3 {
      font-size: 14px;
      font-weight: 800;
    }

    .card-head .link {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
    }

    /* KPI cards */
    .kpi {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .kpi .kpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .kpi .ic-wrap {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .kpi .value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .kpi .label {
      font-size: 12px;
      color: var(--text-2);
    }

    .kpi .delta {
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .delta.up {
      color: var(--primary);
    }

    .delta.down {
      color: var(--red);
    }

    .dashboard-kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .dashboard-kpi {
      position: relative;
      min-height: 132px;
      padding: 16px;
      overflow: hidden;
    }

    .dashboard-kpi::after {
      content: '';
      position: absolute;
      right: -30px;
      bottom: -34px;
      width: 98px;
      height: 98px;
      border-radius: 50%;
      background: rgba(16, 124, 65, .08);
    }

    .dashboard-kpi .kpi-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .dashboard-kpi .kpi-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 19px;
    }

    .dashboard-kpi .kpi-number {
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .dashboard-kpi .kpi-label {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 7px;
      line-height: 1.35;
      position: relative;
      z-index: 1;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: minmax(96px, 140px) minmax(0, 1fr) 44px;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
    }

    .summary-name {
      font-weight: 700;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-track {
      height: 9px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .summary-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      min-width: 3px;
    }

    .summary-count {
      text-align: right;
      font-weight: 800;
      color: var(--primary);
    }

    .dashboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dashboard-item {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
    }

    .dashboard-item:hover {
      background: #F8FBF9;
    }

    .dashboard-item .item-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
      color: var(--primary);
    }

    .dashboard-item .item-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .dashboard-item .item-sub {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.4;
    }

    .dashboard-item .item-meta {
      font-size: 11.5px;
      color: var(--text-hint);
      white-space: nowrap;
    }

    .dashboard-photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 10px;
    }

    .dashboard-photo {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
      padding: 0;
      background: var(--surface-2);
      cursor: pointer;
    }

    .dashboard-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .14s;
    }

    .dashboard-photo:hover img {
      transform: scale(1.04);
    }

    .dashboard-state {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--r-md);
      margin-bottom: 14px;
      font-size: 12.5px;
    }

    .dashboard-state.loading {
      background: #EFF6FF;
      color: var(--blue);
      border: 1px solid rgba(37, 99, 235, .14);
    }

    .dashboard-state.error {
      background: rgba(220, 38, 38, .08);
      color: var(--red);
      border: 1px solid rgba(220, 38, 38, .14);
    }

    @media(max-width:1280px) {
      .dashboard-kpis {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media(max-width:900px) {

      .dashboard-kpis,
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .dashboard-item {
        grid-template-columns: 38px minmax(0, 1fr);
      }

      .dashboard-item .item-meta {
        grid-column: 2;
        white-space: normal;
      }
    }

    /* Tables */
    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 10px 12px;
      border-bottom: 1.5px solid var(--border);
      white-space: nowrap;
      background: var(--surface-2);
    }

    thead th:first-child {
      border-top-left-radius: 10px;
    }

    thead th:last-child {
      border-top-right-radius: 10px;
    }

    tbody td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      vertical-align: middle;
    }

    tbody tr {
      transition: background .12s;
    }

    tbody tr:hover {
      background: #F8FBF9;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .cell-strong {
      font-weight: 700;
      color: var(--text);
    }

    .cell-sub {
      font-size: 11.5px;
      color: var(--text-hint);
    }

    .row-link {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
    }

    .row-link:hover {
      text-decoration: underline;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
    }

    .badge::before {
      content: '';

    function getCommunesForProvince(provinceName) {
      if (!provinceName) return [];
      const normalized = provinceName.trim().toLowerCase();
      if (normalized.includes('lâm đồng') || normalized.includes('lam dong')) return COMMUNE_MAP['Lâm Đồng'];
      if (normalized.includes('đắk lắk') || normalized.includes('dak lak')) return COMMUNE_MAP['Đắk Lắk'];
      if (normalized.includes('gia lai')) return COMMUNE_MAP['Gia Lai'];
      if (normalized.includes('quảng trị') || normalized.includes('quang tri')) return COMMUNE_MAP['Quảng Trị'];
      if (normalized.includes('quảng nam') || normalized.includes('quang nam')) return COMMUNE_MAP['Quảng Nam'];
      if (normalized.includes('đắk nông') || normalized.includes('dak nong')) return COMMUNE_MAP['Đắk Nông'];
      return ['Xã Lộc An', 'Xã Lộc Lâm', 'Xã Lộc Bắc', 'Xã Lộc Bảo']; // Fallback
    }

    function fmtNum(n, d = 0) { return Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
    function fmtMoney(n) { return fmtNum(n, 0); }
    function formatDateTimeVN(value) {
      if (!value) return '—';
      return new Date(value).toLocaleString('vi-VN', {
        timeZone: 'Asia/Ho_Chi_Minh',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }
    function formatDateKeyVN(value) {
      if (!value) return '';
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Ho_Chi_Minh',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).formatToParts(new Date(value));
      const byType = Object.fromEntries(parts.map(p => [p.type, p.value]));
      return `${byType.year}-${byType.month}-${byType.day}`;
    }

      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3200);

    function fillDemo(email) {

    function demoUserFromCredentials(email, password) {
      const normalized = email.trim().toLowerCase();
      if (password !== '123456') return null;
      const demo = DB.users.find(u => u.email.toLowerCase() === normalized);
      if (!demo) return null;
      const blockMessage = profileBlockMessage(demo);
      if (blockMessage) throw new Error(blockMessage);
      return {
        id: demo.id,
        fullName: demo.fullName,
        email: demo.email,
        phone: demo.phone || '',
        role: demo.role,
        status: demo.status || 'active',
        ownerId: null,
        isDemo: true,
      };
    }

    async function enterDashboard(user, { loadRemote = true, demoMode = false } = {}) {
      currentUser = user;
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').style.display = 'flex';
      if (loadRemote) await loadDataFromSupabase();
      if (demoMode) toast('Đang dùng chế độ mẫu/offline vì xác thực Supabase hoặc hồ sơ người dùng chưa sẵn sàng.', 'error');
      navigate('dashboard');

    function showLoginMessage(message) {
      currentUser = null;
      currentProfile = null;
      document.getElementById('appView').style.display = 'none';
      document.getElementById('loginView').style.display = 'flex';
      const err = document.getElementById('loginError');
      err.textContent = message;
      err.style.display = 'block';
    }
    function profileBlockMessage(profile) {
      if (!profile) return 'Không tìm thấy hồ sơ người dùng.';
      if (profile.status === 'inactive') return 'Tài khoản chưa được kích hoạt.';
      if (profile.status === 'locked') return 'Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.';
      if (profile.status !== 'active') return 'Tài khoản chưa được kích hoạt.';
      return '';
    }
    function profileToDashboardUser(authUser, profile) {
      return {
        id: authUser.id,
        fullName: profile.full_name || profile.fullName || profile.email || authUser.email,
        email: profile.email || authUser.email,
        phone: profile.phone || '',
        role: roleFromSupabase(profile.role),
        status: profile.status,
        ownerId: profile.owner_id || null,
      };
    }
    async function loadCurrentProfile(authUser) {
      const { data: profile, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', authUser.id)
        .maybeSingle();
      if (error) throw error;
      return profile;
    }
    async function enforceAuthenticatedUser(authUser, { showMessage = true, loadRemote = true } = {}) {
      const profile = await loadCurrentProfile(authUser);
      const blockMessage = profileBlockMessage(profile);
      if (blockMessage) {
        await supabaseClient.auth.signOut();
        if (showMessage) showLoginMessage(blockMessage);
        return null;
      }
      currentProfile = profile;
      const user = profileToDashboardUser(authUser, profile);
      await enterDashboard(user, { loadRemote });
      return user;
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const allowDemoFallback = demoFallbackRequested || !navigator.onLine;
      demoFallbackRequested = false;
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      try {
        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
        if (authError) throw authError;
        await enforceAuthenticatedUser(authData.user, { showMessage: true, loadRemote: true });
      } catch (e) {
        console.error(e);
        if (allowDemoFallback) {
          try {
            const demo = demoUserFromCredentials(email, pass);
            if (demo) {
              await enterDashboard(demo, { loadRemote: false, demoMode: true });
              return;
            }
          } catch (demoError) {
            err.textContent = demoError.message;
            err.style.display = 'block';
            return;
          }
        }
        err.textContent = e.message || 'Email hoặc mật khẩu không đúng.';
        err.style.display = 'block';
      }
    }

      await supabaseClient.auth.signOut();
      currentUser = null;
      currentProfile = null;
      document.getElementById('appView').style.display = 'none';
      document.getElementById('loginView').style.display = 'flex';
      document.getElementById('loginError').style.display = 'none';

    function authRedirectParams() {
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const query = new URLSearchParams(window.location.search);
      return {
        type: hash.get('type') || query.get('type') || '',
        code: query.get('code') || '',
        accessToken: hash.get('access_token') || '',
        refreshToken: hash.get('refresh_token') || '',
      };
    }
    function isPasswordSetupRedirect(params) {
      const type = (params.type || '').toLowerCase();
      return ['invite', 'recovery', 'signup'].includes(type) || !!params.accessToken || !!params.code;
    }
    async function handlePasswordSetupRedirect() {
      const params = authRedirectParams();
      if (!isPasswordSetupRedirect(params)) return;
      try {
        if (params.code) {
          const { error } = await supabaseClient.auth.exchangeCodeForSession(params.code);
          if (error) throw error;
        } else if (params.accessToken && params.refreshToken) {
          const { error } = await supabaseClient.auth.setSession({
            access_token: params.accessToken,
            refresh_token: params.refreshToken,
          });
          if (error) throw error;
        }
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          window.history.replaceState({}, document.title, window.location.pathname);
          openPasswordSetupModal(session.user?.email || '');
        }
      } catch (error) {

    function openPasswordSetupModal(email = '') {

      openModal('Thiết lập mật khẩu', `

    }
    async function setupInvitedPassword() {
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (!password || password.length < 6) return showPasswordSetupError('Mật khẩu tối thiểu 6 ký tự.');
      if (password !== confirm) return showPasswordSetupError('Hai mật khẩu chưa trùng nhau.');
      const btn = document.getElementById('passwordSetupBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Đang lưu...'; }
      try {
        const { error } = await supabaseClient.auth.updateUser({ password });
        if (error) throw error;
        toast('Thiết lập mật khẩu thành công. Vui lòng đăng nhập lại.');
        closeModal();
        await supabaseClient.auth.signOut();
        currentUser = null;
        currentProfile = null;
        document.getElementById('appView').style.display = 'none';
        document.getElementById('loginView').style.display = 'flex';
        document.getElementById('loginError').style.display = 'none';
      } catch (error) {
        console.error(error);
        showPasswordSetupError(error.message || 'Không thể thiết lập mật khẩu.');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Lưu mật khẩu'; }
      }
    }
    async function bootstrapExistingSession() {
      const params = authRedirectParams();
      if (isPasswordSetupRedirect(params)) {
        await handlePasswordSetupRedirect();
        return;
      }
      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (!session?.user) return;
        await enforceAuthenticatedUser(session.user, { showMessage: true, loadRemote: true });
      } catch (error) {
        console.error(error);
        await supabaseClient.auth.signOut();
        showLoginMessage(error.message || 'Phiên đăng nhập không hợp lệ. Vui lòng đăng nhập lại.');
      }
    }

    async function loadDataFromSupabase() {
      try {
        dataLoadError = null;
        const [
          profilesRes, ownersRes, projectsRes, logbooksRes, checkinsRes,
          plotsRes, treesRes, factorsRes, filesRes, notificationsRes
        ] = await Promise.all([
          supabaseClient.from('profiles').select('*'),
          supabaseClient.from('forest_owners').select('*'),
          supabaseClient.from('forest_projects').select('*'),
          supabaseClient.from('logbooks').select('*').order('created_at', { ascending: false }),
          supabaseClient.from('checkins').select('*').order('created_at', { ascending: false }),
          supabaseClient.from('inventory_plots').select('*'),
          supabaseClient.from('inventory_trees').select('*'),
          supabaseClient.from('carbon_factors').select('*'),
          supabaseClient.from('files').select('*'),
          supabaseClient.from('notifications').select('*').order('created_at', { ascending: false }),
        ]);
        [profilesRes, ownersRes, projectsRes, logbooksRes, checkinsRes, plotsRes, treesRes, factorsRes, filesRes, notificationsRes]
          .forEach(r => { if (r.error) throw r.error; });

        const ownerMap = Object.fromEntries((ownersRes.data || []).map(o => [o.id, o]));
        const projectMap = Object.fromEntries((projectsRes.data || []).map(p => [p.id, p]));
        const profileMap = Object.fromEntries((profilesRes.data || []).map(p => [p.id, p]));

        DB.users = (profilesRes.data || []).map(p => ({
          id: p.id, fullName: p.full_name || p.email, email: p.email, phone: p.phone || '',
          role: roleFromSupabase(p.role), status: p.status || 'active', ownerId: p.owner_id || null
        }));
        DB.owners = (ownersRes.data || []).map(o => ({
          id: o.id, code: o.owner_code, name: o.owner_name, type: ownerTypeLabel(o.type),
          regNo: o.identity_no || '', phone: o.phone || '', email: o.email || '',
          province: o.address || '', status: 'active',
          totalProjects: (projectsRes.data || []).filter(p => p.owner_id === o.id).length,
          totalArea: (projectsRes.data || []).filter(p => p.owner_id === o.id).reduce((sum, p) => sum + Number(p.area_ha || 0), 0)
        }));
        DB.projects = (projectsRes.data || []).map((p, i) => ({
          id: p.id, code: p.project_code, name: p.project_name,
          ownerId: p.owner_id || null,
          ownerCode: ownerMap[p.owner_id]?.owner_code || '', ownerName: ownerMap[p.owner_id]?.owner_name || '',
          province: p.province || '', district: p.district || '', commune: p.commune || '',
          area: Number(p.area_ha || 0), forestType: p.forest_type || '', treeSpecies: p.tree_species || '',
          yearPlanted: p.year_planted || '', status: p.status || 'draft',
          lat: 12.2 + (i % 6) * 0.35, lng: 107.5 + (i % 5) * 0.25
        }));
        DB.logbooks = (logbooksRes.data || []).map(l => {
          const logProjectId = l.project_id || l.projectId || null;
          const logUserId = l.user_id || l.created_by || l.worker_id || null;
          const project = projectMap[logProjectId] || {};
          const profile = profileMap[logUserId] || {};
          const photos = parsePhotoUrls(l.photo_urls);
          const createdAt = l.created_at || l.updated_at || '';
          return {
            id: l.id, projectId: logProjectId, ownerId: l.owner_id || l.forest_owner_id || project.owner_id || null, userId: logUserId,
            created_at: createdAt, date: formatDateTimeVN(createdAt), dateKey: formatDateKeyVN(createdAt), type: jobTypeLabel(l.work_type),
            user: profile.full_name || profile.email || l.user_name || l.created_by_email || logUserId,
            project: project.project_name || '—', location: project.province || '—',
            lat: Number(l.latitude || 0), lng: Number(l.longitude || 0),
            photos: photos.length, photoUrls: photos, photo_urls: l.photo_urls,
            desc: l.description || l.content || l.note || '', synced: l.is_synced !== false,
            status: l.status || (l.is_synced === false ? 'pending' : 'active')
          };
        });
        const rawCheckins = checkinsRes.data || [];
        rawCheckins.sort((a, b) => {
          const tA = new Date(a.checked_at || a.created_at || 0);
          const tB = new Date(b.checked_at || b.created_at || 0);
          return tA - tB;
        });

        const checkinGroups = {};
        rawCheckins.forEach(c => {
          const profile = profileMap[c.user_id] || {};
          const createdAt = c.checked_at || c.created_at || c.checkin_time || c.timestamp || c.date || '';
          const lat = Number(c.latitude ?? c.lat ?? 0);
          const lng = Number(c.longitude ?? c.lng ?? 0);
          const synced = c.is_synced !== false && c.synced !== false;
          
          const dt = new Date(createdAt);
          const dayKey = `${dt.getFullYear()}-${dt.getMonth() + 1}-${dt.getDate()}`;
          const groupKey = `${c.user_id}_${dayKey}`;

          const item = {
            ...c,
            id: c.id,
            user: profile.full_name || profile.email || c.user_name || c.user || c.user_id || 'Không rõ',
            created_at: createdAt,
            date: formatDateTimeVN(createdAt),
            dateKey: formatDateKeyVN(createdAt),
            latitude: lat,
            longitude: lng,
            lat,
            lng,
            is_synced: synced,
            synced,
            type: 'check_in'
          };

          if (!checkinGroups[groupKey]) checkinGroups[groupKey] = [];
          checkinGroups[groupKey].push(item);
        });

        const processedCheckins = [];
        Object.keys(checkinGroups).forEach(groupKey => {
          const list = checkinGroups[groupKey];
          for (let i = 0; i < list.length; i++) {
            list[i].type = (i % 2 === 0) ? 'check_in' : 'check_out';
            processedCheckins.push(list[i]);
          }
        });

        processedCheckins.sort((a, b) => {
          const tA = new Date(a.created_at || 0);
          const tB = new Date(b.created_at || 0);
          return tB - tA;
        });

        DB.checkins = processedCheckins;
        DB.plots = (plotsRes.data || []).map(p => ({
          id: p.id, code: p.plot_code, projectCode: projectMap[p.project_id]?.project_code || '',
          area: Number(p.area || 0), lat: Number(p.latitude || 0), lng: Number(p.longitude || 0), status: 'active'
        }));
        DB.trees = (treesRes.data || []).map(t => ({
          plotCode: (plotsRes.data || []).find(p => p.id === t.plot_id)?.plot_code || '',
          species: t.species || '', dbh: Number(t.dbh || 0), height: Number(t.height || 0), quantity: Number(t.quantity || 0)
        }));
        DB.speciesFactors = (factorsRes.data || []).map(f => ({ species: f.species, factor: Number(f.factor || 0) }));
        DB.files = (filesRes.data || []).map(f => ({
          name: f.file_name || '', category: f.file_group || '', project: projectMap[f.project_id]?.project_name || '',
          uploader: 'Supabase', date: formatDateTimeVN(f.created_at), size: '—', url: f.file_url
        }));
        DB.notifications = (notificationsRes.data || []).map(n => ({
          type: n.type || 'info', title: n.title || '', desc: n.message || '',
          time: formatDateTimeVN(n.created_at), read: n.is_read
        }));
        refreshDerivedStats();
      } catch (e) {
        console.error("Error loading data from Supabase:", e);
        dataLoadError = e.message || 'Không thể tải dữ liệu từ Supabase.';
        toast("Không thể lấy dữ liệu từ Supabase. Đang dùng dữ liệu mẫu offline.", "error");
      }
    }

    function countBy(rows, getter) {
      return Object.entries(rows.reduce((acc, row) => {
        const key = getter(row) || 'Chưa có dữ liệu';
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {})).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
    }
    function dashboardSummaryHtml(rows, emptyText) {
      if (!rows.length) return `<div class="empty-state"><div class="ic">📊</div><div>${emptyText}</div></div>`;
      const max = Math.max(...rows.map(r => r.count), 1);
      return `<div class="summary-list">${rows.map(r => `
    <div class="summary-row">
      <div class="summary-name" title="${safeText(r.name)}">${safeText(r.name)}</div>
      <div class="summary-track"><div class="summary-bar" style="width:${Math.max(6, r.count * 100 / max)}%"></div></div>
      <div class="summary-count">${fmtNum(r.count)}</div>
    </div>`).join('')}</div>`;
    }
    function dashboardLatestPhotos(logs) {
      const photos = [];
      logs.forEach(log => {
        logPhotos(log).forEach((url, index) => photos.push({ url, index, logId: log.id, date: log.date, type: log.type }));
      });
      return photos.slice(0, 12);

    async function approveProjectDirectly(code, approve) {
      const p = DB.projects.find(x => x.code === code);
      if (!p) return;

      const nextStatus = approve ? 'approved' : 'rejected';

      if (currentUser?.isDemo) {
        p.status = nextStatus;
        toast(approve ? 'Đã phê duyệt dự án thành công! (Chế độ Demo)' : 'Đã từ chối phê duyệt dự án. (Chế độ Demo)', approve ? 'success' : 'error');

        DB.notifications.unshift({
          type: 'project',
          title: approve ? 'Dự án đã được duyệt' : 'Dự án bị từ chối',
          desc: `Dự án rừng "${p.name}" của bạn đã được Admin ${approve ? 'phê duyệt và chuyển sang hoạt động' : 'từ chối phê duyệt'}.`,
          time: 'Vừa xong',
          read: false
        });

        renderProjects();
        renderSidebar();
        return;
      }

      try {
        const { error: projectError } = await supabaseClient
          .from('forest_projects')
          .update({ status: nextStatus })
          .eq('id', p.id);

        if (projectError) throw projectError;

        const ownerUser = DB.users.find(u => u.ownerId === p.ownerId);
        const targetUserId = ownerUser ? ownerUser.id : null;

        const { error: notifError } = await supabaseClient
          .from('notifications')
          .insert({
            user_id: targetUserId,
            title: approve ? 'Dự án đã được duyệt' : 'Dự án bị từ chối',
            message: `Dự án rừng "${p.name}" của bạn đã được Admin ${approve ? 'phê duyệt và chuyển sang hoạt động' : 'từ chối phê duyệt'}.`,
            type: 'project',
            is_read: false
          });

        if (notifError) {
          console.warn("Could not insert notification to database:", notifError);
        }

        toast(approve ? 'Đã phê duyệt dự án thành công!' : 'Đã từ chối phê duyệt dự án.', approve ? 'success' : 'error');

        await loadDataFromSupabase();
        renderProjects();
        renderSidebar();
      } catch (err) {
        console.error(err);
        toast(err.message || 'Lỗi khi đồng bộ phê duyệt dự án lên Supabase', 'error');
      }
    }

    function filterProjects(q) {
      q = q.toLowerCase();

    async function saveProject(code) {
      const ownerCode = document.getElementById('p_owner').value;
      const owner = DB.owners.find(o => o.code === ownerCode);
      const isOwner = currentUser.role === 'forest_owner';

      const data = {
        name: document.getElementById('p_name').value.trim(),
        ownerCode, ownerName: owner ? owner.name : '',
        province: document.getElementById('p_province').value,
        district: '', // Quận/Huyện bị loại bỏ hoàn toàn
        commune: document.getElementById('p_commune').value,
        forestType: document.getElementById('p_forestType').value,
        treeSpecies: document.getElementById('p_species').value,
        yearPlanted: Number(document.getElementById('p_year').value),
        area: Number(document.getElementById('p_area').value),
        status: document.getElementById('p_status').value,
      };

      if (!data.name || !data.area) { toast('Vui lòng nhập đủ Tên dự án và Diện tích', 'error'); return; }

      // Validate constraints for OWNER
      if (isOwner) {
        const ownerProv = owner ? owner.province : 'Lâm Đồng';

        // 1. Check province match
        if (ownerProv && data.province.toLowerCase() !== ownerProv.toLowerCase()) {
          toast(`Lỗi: Chủ rừng chỉ được phép tạo dự án thuộc tỉnh ${ownerProv}.`, 'error');
          return;
        }
      }

      if (currentUser?.isDemo) {
        if (code) {
          Object.assign(DB.projects.find(p => p.code === code), data);
          toast('Đã cập nhật dự án thành công (Chế độ Demo)');
        } else {
          const newCode = 'PRJ-' + String(DB.projects.length + 1).padStart(4, '0');
          DB.projects.push({
            code: newCode,
            lat: owner ? (owner.province === 'Lâm Đồng' ? 11.58 : 12.6) : 12.3,
            lng: owner ? (owner.province === 'Lâm Đồng' ? 108.07 : 108.25) : 108.2,
            ...data
          });
          toast(isOwner ? 'Đã tạo yêu cầu đăng ký dự án rừng (Chờ Admin duyệt - Chế độ Demo)' : 'Đã tạo và phân công dự án (Chế độ Demo)');
        }
        closeModal();
        renderProjects();
        return;
      }

      const saveBtn = document.querySelector('.modal-foot .btn-primary');
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Đang lưu...';
      }

      try {
        const payload = {
          owner_id: owner ? owner.id : null,
          project_name: data.name,
          province: data.province,
          district: null,
          commune: data.commune,
          forest_type: data.forestType,
          tree_species: data.treeSpecies,
          year_planted: data.yearPlanted,
          area_ha: data.area,
          status: data.status,
        };

        if (code) {
          const proj = DB.projects.find(p => p.code === code);
          if (!proj) throw new Error('Không tìm thấy dự án tương ứng.');

          const { error } = await supabaseClient
            .from('forest_projects')
            .update(payload)
            .eq('id', proj.id);

          if (error) throw error;
          toast('Đã cập nhật dự án thành công');
        } else {
          let codeNum = DB.projects.length + 1;
          let newCode = 'PRJ-' + String(codeNum).padStart(4, '0');
          while (DB.projects.some(p => p.code === newCode)) {
            codeNum++;
            newCode = 'PRJ-' + String(codeNum).padStart(4, '0');
          }
          payload.project_code = newCode;

          const { error } = await supabaseClient
            .from('forest_projects')
            .insert(payload);

          if (error) throw error;
          toast(isOwner ? 'Đã tạo yêu cầu đăng ký dự án rừng (Chờ Admin duyệt)' : 'Đã tạo và phân công dự án');
        }
        closeModal();
        await loadDataFromSupabase();
        renderProjects();
      } catch (err) {
        console.error(err);
        toast(err.message || 'Lỗi khi lưu dự án vào Supabase', 'error');
      } finally {
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 Lưu';
        }
      }
    }

    /* ====================== GIS UPLOAD ====================== */
    let _gisLayer = null;
    function handleGisUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const fileNameLower = file.name.toLowerCase();
      const isZip = fileNameLower.endsWith('.zip');
      const isShp = fileNameLower.endsWith('.shp');
      const isKML = fileNameLower.endsWith('.kml');

      const reader = new FileReader();

      if (isZip || isShp) {
        reader.onload = async function (e) {
          const buffer = e.target.result;
          let geojson = null;
          try {
            if (isZip) {
              const result = await shp(buffer);
              if (Array.isArray(result)) {
                geojson = {
                  type: "FeatureCollection",
                  features: result.flatMap(r => r.features || (r.type === 'Feature' ? [r] : []))
                };
              } else {
                geojson = result;
              }
            } else {
              // .shp file alone
              const geometries = shp.parseShp(buffer);
              geojson = {
                type: "FeatureCollection",
                features: geometries.map(geom => ({
                  type: "Feature",
                  properties: {},
                  geometry: geom
                }))
              };
            }

            if (!geojson || !geojson.type) throw new Error("Không thể chuyển đổi Shapefile sang GeoJSON");
            renderGisLayer(geojson, file.name);
          } catch (err) {
            console.error(err);
            toast('Lỗi khi phân tích tệp Shapefile: ' + err.message, 'error');
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        reader.onload = function (e) {
          const text = e.target.result;
          let geojson = null;
          try {
            if (isKML) {
              geojson = parseKMLToGeoJSON(text);
            } else {
              geojson = JSON.parse(text);
            }
            if (!geojson || !geojson.type) throw new Error("Invalid format");
            renderGisLayer(geojson, file.name);
          } catch (err) {
            console.error(err);
            toast('Tệp GIS không hợp lệ hoặc lỗi định dạng', 'error');
          }
        };
        reader.readAsText(file);
      }
      event.target.value = ''; // reset
    }

    function parseKMLToGeoJSON(kmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(kmlText, 'text/xml');
      const coordsNode = doc.querySelector('Polygon coordinates');
      if (!coordsNode) throw new Error("Không tìm thấy Polygon trong KML");
      const coordsText = coordsNode.textContent.trim();
      const pairs = coordsText.split(/\s+/);
      const coordinates = pairs.map(p => {
        const parts = p.split(',');
        return [parseFloat(parts[0]), parseFloat(parts[1])];
      });
      return {
        type: "Feature",
        properties: {},
        geometry: { type: "Polygon", coordinates: [coordinates] }
      };
    }

    function renderGisLayer(geojson, fileName) {
      if (!_map) return;
      if (_gisLayer) _map.removeLayer(_gisLayer);

      _gisLayer = L.geoJSON(geojson, {
        style: { color: '#DC2626', weight: 2, fillColor: '#DC2626', fillOpacity: 0.2 }
      }).addTo(_map);

      _map.fitBounds(_gisLayer.getBounds());

      let areaHa = 0;
      let perimeterKm = 0;
      let center = [0, 0];

      if (typeof turf !== 'undefined') {
        try {
          areaHa = turf.area(geojson) / 10000;
          perimeterKm = turf.length(geojson);
          const c = turf.center(geojson);
          center = c.geometry.coordinates;
        } catch (e) { }
      }

      const panel = document.getElementById('gisInfoPanel');
      const details = document.getElementById('gisDetails');
      if (panel && details) {
        panel.style.display = 'block';
        details.innerHTML = `
      <div class="detail-row"><span class="k">Tệp</span><span class="v mono" style="font-size:11px;">${safeText(fileName)}</span></div>
      <div class="detail-row"><span class="k">Diện tích</span><span class="v" style="color:var(--primary); font-weight:800;">${fmtNum(areaHa, 2)} ha</span></div>
      <div class="detail-row"><span class="k">Chu vi</span><span class="v">${fmtNum(perimeterKm, 2)} km</span></div>
      <div class="detail-row"><span class="k">Tọa độ tâm</span><span class="v" style="font-size:11px;">${center[1].toFixed(5)}, ${center[0].toFixed(5)}</span></div>
    `;
      }
      toast(`Đã hiển thị ranh giới từ tệp ${fileName}`);
    }

    /* ====================== MODULE 8: NHẬT KÝ HIỆN TRƯỜNG ====================== */
    function parsePhotoUrls(value) {
      if (Array.isArray(value)) return value.filter(Boolean).map(String);
      if (!value) return [];
      if (typeof value === 'string') {
        const raw = value.trim();
        if (!raw) return [];
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) return parsed.filter(Boolean).map(String);
          if (parsed && typeof parsed === 'object') return Object.values(parsed).filter(Boolean).map(String);
        } catch (_) {
          return raw.split(',').map(x => x.trim()).filter(Boolean);
        }
      }
      return [];
    }
    function parsePhotoUrls(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      if (typeof val === 'string') {
        try {
          const arr = JSON.parse(val);
          if (Array.isArray(arr)) return arr;
        } catch (e) {
          if (val.startsWith('http')) return val.split(',').map(s => s.trim());
        }
      }
      return [];
    }
    function safeText(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }
    function jsString(value) { return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
    function logPhotos(log) { return parsePhotoUrls(log.photoUrls ?? log.photo_urls); }
    function hasLogGps(log) {
      const lat = Number(log.lat), lng = Number(log.lng);
      return Number.isFinite(lat) && Number.isFinite(lng) && (Math.abs(lat) > 0 || Math.abs(lng) > 0);
    }
    function gpsHtml(log) {
      if (!hasLogGps(log)) return 'Chưa có GPS';
      const lat = Number(log.lat), lng = Number(log.lng);
      const text = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      const url = `https://www.google.com/maps?q=${lat},${lng}`;
      return `<a class="row-link mono" style="font-size:11px;" href="${url}" target="_blank" rel="noopener">${text}</a>`;
    }
    function normalizeKey(value) { return String(value || '').trim().toLowerCase(); }
    function ownerForCurrentUser() {
      if (!currentUser) return null;
      const ownerId = currentProfile?.owner_id || currentUser.ownerId;
      const email = normalizeKey(currentProfile?.email || currentUser.email);
      const fullName = normalizeKey(currentProfile?.full_name || currentUser.fullName);
      return DB.owners.find(o => ownerId && normalizeKey(o.id) === normalizeKey(ownerId)) ||
        DB.owners.find(o => email && normalizeKey(o.email) === email) ||
        DB.owners.find(o => fullName && normalizeKey(o.name) === fullName) ||
        null;
    }
    function ownerProjectsForCurrentUser() {
      const owner = ownerForCurrentUser();
      if (!owner) return [];
      return DB.projects.filter(p =>
        (owner.id && normalizeKey(p.ownerId) === normalizeKey(owner.id)) ||
        (owner.code && normalizeKey(p.ownerCode) === normalizeKey(owner.code)) ||
        (owner.name && normalizeKey(p.ownerName) === normalizeKey(owner.name))
      );
    }
    function logbookScope() {
      const role = currentUser?.role;
      if (role === 'platform_admin') {
        return {
          rows: DB.logbooks,
          ownerProjects: null,
          emptyTitle: 'Chưa có nhật ký hiện trường',
          emptyText: 'Nhật ký sẽ xuất hiện tại đây sau khi nhân viên tạo từ ứng dụng mobile.'
        };
      }
      if (role === 'forest_owner') {
        const owner = ownerForCurrentUser();
        const ownerProjects = ownerProjectsForCurrentUser();
        const projectIds = new Set(ownerProjects.map(p => normalizeKey(p.id)).filter(Boolean));
        const projectNames = new Set(ownerProjects.map(p => normalizeKey(p.name)).filter(Boolean));
        const ownerId = owner?.id || currentProfile?.owner_id || currentUser?.ownerId || null;
        const rows = DB.logbooks.filter(log =>
          (log.projectId && projectIds.has(normalizeKey(log.projectId))) ||
          (log.ownerId && ownerId && normalizeKey(log.ownerId) === normalizeKey(ownerId)) ||
          (log.project && projectNames.has(normalizeKey(log.project)))
        );
        return {
          rows,
          ownerProjects,
          emptyTitle: 'Chưa có nhật ký thuộc dự án của bạn',
          emptyText: 'Nhật ký sẽ xuất hiện khi nhân viên tạo nhật ký trong các dự án rừng thuộc chủ rừng của bạn.'
        };
      }
      if (role === 'forest_worker') {
        const userId = currentUser?.id;
        const email = normalizeKey(currentUser?.email);
        const fullName = normalizeKey(currentUser?.fullName);
        return {
          rows: DB.logbooks.filter(log =>
            (userId && normalizeKey(log.userId) === normalizeKey(userId)) ||
            (email && normalizeKey(log.user) === email) ||
            (fullName && normalizeKey(log.user) === fullName)
          ),
          ownerProjects: null,
          emptyTitle: 'Chưa có nhật ký hiện trường',
          emptyText: 'Nhật ký do bạn tạo trên ứng dụng mobile sẽ xuất hiện tại đây.'

      return {
        rows: [],
        ownerProjects: null,
        emptyTitle: 'Chưa có nhật ký hiện trường',
        emptyText: 'Không tìm thấy dữ liệu phù hợp với quyền truy cập hiện tại.'
      };
    }
    function logLogbookScopeDebug(scope) {

        currentRole: currentUser?.role,

      if (logFilters.date) rows = rows.filter(l => (l.dateKey || '') === logFilters.date);
      return rows;

    function renderLogbook() {

      document.getElementById('pageContent').innerHTML = `

    <div class="logbook-kpis">

      <div class="logbook-kpi"><div class="ic">🖼️</div><div><div class="num">${fmtNum(totalWithPhotos)}</div><div class="txt">Nhật ký có ảnh</div></div></div>
      <div class="logbook-kpi"><div class="ic">📅</div><div><div class="num">${fmtNum(totalToday)}</div><div class="txt">Nhật ký hôm nay</div></div></div>
    </div>

    <div style="display:grid; grid-template-columns:minmax(0,1.65fr) minmax(320px,.9fr); gap:16px;">
      <div class="card">
        <div class="card-head"><h3>Danh sách nhật ký (<span id="logCount">${logs.length}</span>)</h3></div>
        <div id="logListWrap">${logbookCardsHtml(logs, scope.emptyTitle, scope.emptyText)}</div>
      </div>
      <div class="card" id="logDetail">
        ${sel ? logDetailHtml(sel) : logbookEmptyState(scope.emptyTitle, scope.emptyText)}
      </div>
    </div>`;
    }
    function logbookEmptyState(title = 'Chưa có nhật ký hiện trường', text = 'Nhật ký sẽ xuất hiện tại đây sau khi nhân viên tạo từ ứng dụng mobile.') {

    }

      if (!rows.length) return logbookEmptyState(emptyTitle, emptyText);
      return `<div class="logbook-list">${rows.map(logbookCardHtml).join('')}</div>`;

    function logbookCardHtml(log) {
      const photos = logPhotos(log);
      const cover = photos.length
        ? `<img src="${safeText(photos[0])}" alt="Ảnh hiện trường">`
        : 'Không có ảnh';
      const gps = hasLogGps(log) ? `${Number(log.lat).toFixed(5)}, ${Number(log.lng).toFixed(5)}` : 'Chưa có GPS';
      return `
    <div class="logbook-card ${selectedLogId === log.id ? 'active' : ''}" onclick="selectLog('${jsString(log.id)}')">

    function runCalc() {
      const projName = document.getElementById('cc_proj').value;
      const proj = DB.projects.find(p => p.name === projName);
      const plots = DB.plots.filter(pl => pl.projectCode === proj?.code);
      let totalBiomass = 0;
      plots.forEach(pl => {
        DB.trees.filter(t => t.plotCode === pl.code).forEach(t => {
          const sf = DB.speciesFactors.find(f => f.species === t.species)?.factor || 0.48;
          // Biomass = V × WD × BEF × (1+R) — simplified
          const vol = (Math.PI * (t.dbh / 200) ** 2) * t.height * t.quantity;
          totalBiomass += vol * sf * 1.25 * 1000; // kg
        });
      });
      const carbon = totalBiomass * 0.5 / 1000; // tC
      const co2e = carbon * 3.67;
      const code = 'CAL-' + String(DB.calculations.length + 1).padStart(4, '0');
      DB.calculations.unshift({
        code, project: projName, date: new Date().toISOString().slice(0, 10),
        method: document.getElementById('cc_method').value,
        biomass: Math.round(totalBiomass), carbon: Math.round(carbon * 100) / 100, co2e: Math.round(co2e * 100) / 100, status: 'draft'
      });
      toast('Tính toán hoàn tất!'); closeModal(); renderCarbon();
    }

    window.exportDetailedReport = function (calcCode) {
      // Dùng trực tiếp biến DB thay vì window.DB
      if (typeof DB === 'undefined') return alert("Lỗi: Không tìm thấy cơ sở dữ liệu DB!");

      // 1. Lấy thông tin tính toán và dự án
      const calcData = DB.calculations.find(c => c.code === calcCode);
      if (!calcData) return alert("Không tìm thấy dữ liệu tính toán!");

      const proj = DB.projects.find(p => p.name === calcData.project);
      if (!proj) return alert("Không tìm thấy thông tin dự án!");

      // Lấy tất cả ô mẫu thuộc dự án này
      const plots = DB.plots.filter(pl => pl.projectCode === proj.code);

      // 2. Tạo nội dung CSV - Thêm \ufeff để Excel đọc chuẩn Tiếng Việt
      let csvContent = '\ufeff';

      // --- Phần 1: Tiêu đề tổng quan ---
      csvContent += `BÁO CÁO CHI TIẾT TÍNH TOÁN CARBON\n`;
      csvContent += `Mã tính toán:,${calcData.code}\n`;
      csvContent += `Dự án:,${calcData.project}\n`;
      csvContent += `Ngày tính:,${calcData.date}\n`;
      csvContent += `Phương pháp:,${calcData.method}\n\n`;

      // --- Phần 2: Bảng chi tiết từng cây ---
      csvContent += "MÃ Ô MẪU,LOÀI CÂY,DBH (cm),CHIỀU CAO (m),SỐ LƯỢNG,HỆ SỐ GỖ,SINH KHỐI (kg),CARBON (tC),CO2e (tCO2e)\n";

      let totalBio = 0, totalCarb = 0, totalCo2 = 0;

      plots.forEach(pl => {
        // Lấy tất cả các cây nằm trong ô mẫu này
        const trees = DB.trees.filter(t => t.plotCode === pl.code);

        trees.forEach(t => {
          // Tìm hệ số loài cây
          const factorObj = DB.speciesFactors.find(f => f.species === t.species);
          const sf = factorObj ? factorObj.factor : 0.48; // Lấy 0.48 làm mặc định nếu không có

          // Tính toán chi tiết cho từng dòng
          const vol = (Math.PI * Math.pow(t.dbh / 200, 2)) * t.height * t.quantity;
          const biomassKg = vol * sf * 1.25 * 1000;
          const carbonTc = biomassKg * 0.5 / 1000;
          const co2e = carbonTc * 3.67;

          // Cộng dồn để hiển thị dòng Tổng ở cuối
          totalBio += biomassKg;
          totalCarb += carbonTc;
          totalCo2 += co2e;

          // Ghi dữ liệu dòng vào file
          csvContent += `${pl.code},${t.species},${t.dbh},${t.height},${t.quantity},${sf},${biomassKg.toFixed(2)},${carbonTc.toFixed(2)},${co2e.toFixed(2)}\n`;
        });
      });

      // --- Phần 3: Dòng tổng cộng ---
      csvContent += `\nTỔNG CỘNG,,,,,,${(totalBio / 1000).toFixed(2)} tấn,${totalCarb.toFixed(2)},${totalCo2.toFixed(2)}\n`;

      // --- Xử lý tải xuống ---
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.setAttribute("href", url);
      link.setAttribute("download", `Bao_Cao_Chi_Tiet_${calcData.code}.csv`);

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      // Báo thành công
      if (typeof toast === 'function') {
        toast(`Đã tải về báo cáo chi tiết ${calcData.code}!`);
      } else {
        alert(`Đã tải về báo cáo chi tiết ${calcData.code}!`);
      }
    };
